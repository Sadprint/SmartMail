<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>邮件测试</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .email { border-bottom: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    .debug { background: #f9f9f9; padding: 10px; margin-top: 5px; display: none; white-space: pre-wrap; font-size: 13px; }
    button { margin-top: 5px; }
</style>
</head>
<body>
<h1>邮件测试</h1>
<button id="fetchBtn">获取邮件</button>
<div id="output"></div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
const fetchBtn = document.getElementById("fetchBtn");
const output = document.getElementById("output");

fetchBtn.onclick = async () => {
    output.innerHTML = "加载中...";
    try {
        const res = await axios.get("http://localhost:8000/api/emails/process");
        const data = res.data;
        output.innerHTML = `<h2>${data.message}</h2>`;
        data.results.forEach((email, idx) => {
            const emailDiv = document.createElement("div");
            emailDiv.className = "email";
            emailDiv.innerHTML = `
                <strong>📧 邮件 ${idx + 1}</strong><br>
                <strong>主题:</strong> ${email.original_subject}<br>
                <strong>分类:</strong> ${email.classification}<br>
                <strong>AI 回复草稿:</strong> ${email.reply_draft}<br>
                <button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
                    展开 / 折叠 LLM 原始输出与 Debug
                </button>
                <div class="debug">
                    <strong>LLM 原始输出:</strong>\n${email.raw_content}\n\n
                    <strong>Debug 信息:</strong>\n${JSON.stringify(email.debug_info, null, 2)}
                </div>
            `;
            output.appendChild(emailDiv);
        });
    } catch (err) {
        output.innerHTML = "❌ 获取失败，请检查后端是否运行或 CORS 设置。";
        console.error(err);
    }
};
</script>
</body>
</html>
