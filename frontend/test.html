<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Refine Email 测试</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
textarea { width: 100%; height: 100px; margin-top: 10px; }
button { margin-top: 10px; padding: 10px 20px; }
pre { background: #f0f0f0; padding: 10px; }
</style>
</head>
<body>

<h2>邮件 Refine 测试</h2>

<label>修改建议：</label>
<textarea id="suggestion">请将语气更正式一些</textarea>
<br>
<button id="refineBtn">Refine</button>

<h3>结果</h3>
<p><strong>原始草稿：</strong></p>
<pre id="originalDraft">[等待初始化...]</pre>

<p><strong>Refine 后草稿：</strong></p>
<pre id="refinedDraft">[等待 refine...]</pre>

<script>
const testEmailId = "15";  // 和后端初始化测试数据一致

async function initTestData() {
    try {
        const res = await fetch('http://127.0.0.1:8000/api/emails/init_test_data', {
            method: 'POST'
        });
        const data = await res.json();
        console.log("初始化测试数据:", data);
        // 显示原始草稿
        document.getElementById("originalDraft").textContent =
            "您好，李明先生/女士，感谢您的咨询。我将为您安排销售或方案顾问尽快与您联系，为您提供企业版套餐的报价、用户数限制和私有化部署信息。期待您的回复。";
    } catch (err) {
        console.error("初始化测试数据失败:", err);
    }
}

async function refineEmail() {
    const suggestion = document.getElementById("suggestion").value;
    try {
        const res = await fetch('http://127.0.0.1:8000/api/emails/refine', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                email_id: testEmailId,
                suggestion: suggestion
            })
        });
        const data = await res.json();
        console.log("Refine 接口返回:", data);
        document.getElementById("refinedDraft").textContent = data.new_reply_draft || "[无法生成回复]";
    } catch (err) {
        console.error("调用 refine 接口失败:", err);
        document.getElementById("refinedDraft").textContent = "[接口调用失败]";
    }
}

document.getElementById("refineBtn").addEventListener("click", refineEmail);

// 页面加载自动初始化
window.addEventListener("load", initTestData);
</script>

</body>
</html>
